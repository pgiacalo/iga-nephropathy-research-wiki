<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glossary — IgAN Research Wiki</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="sidebar"></nav>

<main class="main">
  <h1>Glossary</h1>
  <p class="subtitle">Plain-language definitions of the medical terms used across the wiki. Terms are auto-linked wherever they appear on other pages — click any linked term to jump here.</p>
  <p class="updated">Last updated: 2026-07-18</p>

  <div id="glossaryApp">
    <form onsubmit="return false" class="no-glossary">
      <input type="search" id="glossSearch" placeholder="Search terms and definitions (partial spellings work)…" autofocus
        style="width:100%;max-width:560px;padding:10px 14px;border:1px solid var(--line);border-radius:8px;font-size:1rem;">
    </form>
    <div class="search-meta" id="glossMeta"></div>
    <div id="glossList"></div>
  </div>
</main>
<script src="wiki.js"></script>
<script src="glossary-data.js"></script>
<script src="glossary.js"></script>
</body>
</html>
